patrolbot_base:
  ros__parameters:
    # Геометрия базы. Эти параметры должны совпадать с URDF и реальной кинематикой.
    wheel_radius: 0.05
    wheel_base: 0.24

    # Имена основных фреймов, которые будут использованы в /odom и TF.
    odom_frame: odom
    base_frame: base_footprint

    # В mock-режиме TF удобно публиковать прямо из узла базы, чтобы быстрее
    # поднимать тестовое окружение без дополнительных компонентов.
    publish_tf: true

    # Если /cmd_vel не обновляется дольше этого интервала, база должна встать.
    cmd_timeout_ms: 500

    # Ограничения скоростей подобраны как безопасные стартовые значения для
    # компактной indoor-платформы.
    max_linear_velocity: 0.5
    max_angular_velocity: 1.2

    # Частота control loop: чем выше, тем плавнее управление, но тем выше
    # требования к CPU и драйверу.
    control_rate_hz: 30.0

    # В mock-конфигурации всегда используется тестовый драйвер моторов.
    driver_mode: mock

    # Параметры serial здесь оставлены для единообразия структуры, но в mock
    # режиме фактически не используются.
    serial_port: /dev/ttyUSB0
    serial_baudrate: 115200

    # Подробные логи обычно выключены, чтобы launch-тесты не засоряли вывод.
    verbose_logging: false
    log_level: info

mock_scan_publisher:
  ros__parameters:
    # Сенсор публикует данные в том же frame, который описан в URDF.
    frame_id: laser_frame

    # Топик intentionally совпадает с тем, что ожидают slam_toolbox и Nav2.
    scan_topic: /scan

    # Частота выбрана умеренной: достаточно для тестов, но без лишней нагрузки.
    publish_rate_hz: 8.0

    # Полный круг сканирования с шагом примерно 1 градус.
    angle_min: -3.14159265359
    angle_max: 3.14159265359
    angle_increment: 0.01745329251

    # Дальность подобрана под типичный недорогой indoor LiDAR.
    range_min: 0.12
    range_max: 8.0

    # Базовая дистанция до "синтетической стены" до внесения искусственного рельефа.
    default_range: 3.5

    # Подробный лог генератора скана обычно не нужен в повседневных тестах.
    verbose_logging: false

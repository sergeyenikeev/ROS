mission:
  # Человекочитаемое имя миссии отображается в /patrol/status и логах.
  name: office_patrol

  # Все waypoint заданы в системе координат карты.
  frame_id: map

  # В базовой конфигурации автозапуск выключен, чтобы оператор контролировал старт.
  autostart: false

  # Рабочий маршрут PatrolBot рассчитан на циклическое патрулирование.
  loop_forever: true

  # Ошибка на точке считается фатальной: для обходного робота лучше явно
  # остановиться и показать проблему, чем молча пропустить важную позицию.
  continue_on_error: false

  # Значения по умолчанию применяются к waypoint, где локальные параметры
  # не переопределены явно.
  default_timeout_sec: 90.0
  default_retries: 2
  retry_backoff_sec: 5.0

  waypoints:
    # Входная точка удобна как стартовая позиция и как проверка возврата в начало цикла.
    - name: entrance
      x: 0.0
      y: 0.0
      yaw_deg: 0.0
      timeout_sec: 60.0
      retries: 1

    # Коридор задаёт длинный прямой прогон и позволяет проверить стабильность
    # следования пути на более протяжённом участке.
    - name: corridor
      x: 1.2
      y: 0.0
      yaw_deg: 0.0
      timeout_sec: 75.0
      retries: 2

    # Поворот к зоне хранения полезен для проверки навигации с разворотом корпуса.
    - name: storage
      x: 1.2
      y: 1.0
      yaw_deg: 90.0
      timeout_sec: 75.0
      retries: 2

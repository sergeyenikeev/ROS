# Тестовая карта используется только для smoke- и integration-сценариев.
# Она не предназначена для реальной эксплуатации робота в помещении.
image: test_map.pgm

# Тринарный режим удобен для предсказуемых тестов: клетка либо свободна,
# либо занята, либо неизвестна.
mode: trinary

# Разрешение совпадает с основным разрешением конфигов Nav2 и SLAM.
resolution: 0.05

# Начало координат карты задаёт положение нижнего левого угла изображения в frame map.
origin: [-1.0, -1.0, 0.0]

# Значения negate/threshold соответствуют стандартной семантике map_server.
negate: 0
occupied_thresh: 0.65
free_thresh: 0.196
